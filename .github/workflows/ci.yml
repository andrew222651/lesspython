name: ci

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: ty check
        run: ty check lesspython
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m unittest discover -s tests
